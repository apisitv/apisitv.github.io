<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apisit Vijit - Portfolio</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="page">
        <section class="identity" aria-label="Profile">
            <!-- <img src="apisit.png" alt="Apisit Profile" class="avatar"> -->
            <div class="avatar-container">
                <img src="apisit.png" alt="Apisit Profile" class="avatar-img">
            </div>
            <div>
                <h1>Apisit Vijit</h1>
                <p>Software engineer</p>
            </div>
        </section>

        <section class="hero" aria-label="Hero">
            <div class="hero-stage">
                <svg class="hero-orbit" id="heroOrbit" aria-hidden="true" viewBox="0 0 100 100"
                    preserveAspectRatio="none">
                    <path id="heroOrbitPath"></path>
                </svg>
                <div class="nav-cluster" id="navCluster" aria-label="Sections" role="tablist"
                    aria-orientation="vertical"></div>
                <div class="icon-rail" id="iconRail" aria-hidden="true"></div>
                <div class="video-shell">
                    <canvas class="model-canvas" id="heroCanvas" aria-label="3D model viewer"></canvas>
                    <div class="video-fallback" id="videoFallback">
                        <p>3D preview is unavailable right now. The viewer is ready to use once the model can be loaded
                            successfully.</p>
                    </div>
                    <div class="video-status" id="videoStatus" aria-live="polite">
                        <span class="video-dot" aria-hidden="true"></span>
                        <span id="videoStatusText">Loading 3D preview...</span>
                    </div>
                </div>
            </div>
        </section>

        <aside class="panel" aria-live="polite">
            <div class="panel-header">
                <div class="panel-badge" id="panelBadge"></div>
                <h2 id="panelHeading"></h2>
            </div>
            <div class="panel-content" id="panelRoot" role="tabpanel" tabindex="0">
                <div class="panel-copy">
                    <h3 id="panelTitle"></h3>
                    <p id="panelDescription"></p>
                    <div class="panel-meta" id="panelMeta"></div>
                </div>
                <div class="panel-body" id="panelBody"></div>
            </div>
        </aside>
