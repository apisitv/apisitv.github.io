<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apisit Vijit - Portfolio</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.ico">
    <style>
        :root {
            --bg: #f4f2ef;
            --bg-warm: rgba(255, 236, 209, 0.72);
            --surface: rgba(255, 255, 255, 0.7);
            --surface-strong: rgba(255, 255, 255, 0.9);
            --surface-muted: rgba(248, 247, 244, 0.95);
            --text: #161616;
            --text-soft: #5f5f5f;
            --text-faint: #8e8e8e;
            --border: rgba(21, 21, 21, 0.08);
            --shadow: 0 24px 70px rgba(0, 0, 0, 0.08);
            --shadow-soft: 0 16px 36px rgba(0, 0, 0, 0.06);
            --active: #171717;
            --accent: #0050C4;
            --radius-xl: 34px;
            --radius-lg: 26px;
            --radius-md: 20px;
            --radius-pill: 999px;
            --page-padding: clamp(20px, 3vw, 44px);
            --font: "Segoe UI", "Inter", system-ui, sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            font-family: var(--font);
            color: var(--text);
            background:
                radial-gradient(circle at 50% 18%, rgba(255, 248, 231, 0.95) 0%, rgba(255, 243, 220, 0.58) 18%, rgba(244, 242, 239, 0) 46%),
                linear-gradient(180deg, #f5f3ef 0%, #f2f0ec 100%);
            overflow-x: hidden;
        }

        body {
            position: relative;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: auto;
            pointer-events: none;
            z-index: 0;
            filter: blur(72px);
            opacity: 0.7;
        }

        body::before {
            top: 8%;
            left: 32%;
            width: 42vw;
            height: 42vw;
            background: radial-gradient(circle, rgba(255, 227, 188, 0.88) 0%, rgba(255, 227, 188, 0.18) 45%, rgba(255, 227, 188, 0) 72%);
        }

        body::after {
            bottom: 6%;
            left: 24%;
            width: 52vw;
            height: 12vw;
            background: radial-gradient(circle, rgba(0, 0, 0, 0.08) 0%, rgba(0, 0, 0, 0) 68%);
        }

        .page {
            position: relative;
            z-index: 1;
            height: 100dvh;
            padding: var(--page-padding) var(--page-padding) 0;
            display: grid;
            grid-template-columns: 1fr;
            gap: 0;
            align-items: center;
            overflow: hidden;
        }

        .identity {
            position: absolute;
            top: var(--page-padding);
            left: var(--page-padding);
            z-index: 5;
            display: inline-flex;
            align-items: center;
            gap: 16px;
            padding-top: 2px;
        }

        .avatar-container {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: var(--shadow-soft);
            background: linear-gradient(135deg, #8f8b83 0%, #59554c 100%);
            flex-shrink: 0;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.4);
        }

        .identity h1,
        .identity p {
            margin: 0;
            line-height: 1.05;
        }

        .identity h1 {
            font-size: clamp(2rem, 3vw, 3.4rem);
            font-weight: 500;
            letter-spacing: -0.04em;
        }

        .identity p {
            margin-top: 8px;
            color: var(--text-soft);
            font-size: clamp(1rem, 1.45vw, 1.6rem);
            font-weight: 400;
        }

        .hero {
            grid-column: 1;
            height: calc(100dvh - var(--page-padding));
            position: relative;
            display: grid;
            place-items: center;
            overflow: visible;
        }

        .hero-stage {
            position: relative;
            width: 100%;
            max-width: 1320px;
            height: min(820px, calc(100dvh - var(--page-padding)));
            display: grid;
            place-items: stretch;
        }


        .hero-orbit {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .hero-orbit path {
            fill: none;
            stroke: rgba(87, 87, 87, 0.14);
            stroke-width: 1.5;
            vector-effect: non-scaling-stroke;
        }

        .video-shell {
            position: absolute;
            left: 50%;
            bottom: 0;
            width: clamp(390px, 32vw, 560px);
            aspect-ratio: 9 / 16;
            z-index: 2;
            display: grid;
            place-items: center;
            isolation: isolate;
            border-radius: 36px;
            transform: translateX(-50%) translateY(44px);
        }

        .model-canvas {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 36px 36px 0px 0px;
            cursor: grab;
            filter: drop-shadow(0 18px 28px rgba(0, 0, 0, 0.14));
        }

        .model-canvas:active {
            cursor: grabbing;
        }

        .video-fallback {
            position: absolute;
            inset: 8% 10% 10%;
            border-radius: 32px;
            display: none;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(241, 239, 234, 0.88));
            color: var(--text-soft);
            box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.04);
            backdrop-filter: blur(14px);
        }

        .video-shell.is-fallback .video-fallback {
            display: flex;
        }

        .video-shell.is-fallback .model-canvas {
            opacity: 0;
            pointer-events: none;
        }

        .video-status {
            position: absolute;
            left: 50%;
            bottom: 8%;
            transform: translateX(-50%);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 36px;
            padding: 0 14px;
            border-radius: var(--radius-pill);
            background: rgba(255, 255, 255, 0.72);
            color: var(--text-soft);
            font-size: 0.84rem;
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(12px);
            opacity: 0;
            transition: opacity 180ms ease;
        }

        .video-shell.is-loading .video-status,
        .video-shell.is-fallback .video-status {
            opacity: 1;
        }

        .video-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
        }

        .nav-cluster {
            position: absolute;
            inset: 0;
            z-index: 3;
            pointer-events: none;
        }

        .nav-item {
            appearance: none;
            border: 0;
            background: rgba(255, 255, 255, 0.72);
            color: var(--text);
            border-radius: var(--radius-pill);
            min-height: 48px;
            padding: 0 22px;
            display: inline-flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            width: fit-content;
            max-width: 100%;
            backdrop-filter: blur(16px);
            box-shadow: 0 8px 22px rgba(0, 0, 0, 0.05);
            font-size: 1.02rem;
            cursor: pointer;
            transition: transform 180ms ease, background-color 180ms ease, color 180ms ease, box-shadow 180ms ease;
            position: absolute;
            pointer-events: auto;
            white-space: nowrap;
        }

        .nav-item-icon {
            display: none;
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .nav-item-icon svg {
            width: 100%;
            height: 100%;
        }

        .nav-item-label {
            display: inline;
        }

        .nav-item:hover {
            transform: translateX(4px);
        }

        .nav-item:focus-visible {
            outline: 2px solid rgba(45, 102, 255, 0.42);
            outline-offset: 3px;
        }

        .nav-item.is-active {
            background: var(--active);
            color: #fff;
            box-shadow: 0 14px 28px rgba(0, 0, 0, 0.18);
        }

        .icon-rail {
            position: absolute;
            inset: 0;
            z-index: 3;
            pointer-events: none;
        }

        .icon-node {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 0;
            display: grid;
            place-items: center;
            color: var(--text-soft);
            background: rgba(255, 255, 255, 0.76);
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(14px);
            transition: transform 180ms ease, background-color 180ms ease, color 180ms ease;
            position: absolute;
            pointer-events: none;
        }

        .icon-node.is-active {
            background: var(--accent);
            color: white;
            transform: scale(1.03);
        }

        .icon-node svg {
            width: 21px;
            height: 21px;
        }

        .nav-help {
            display: none;
        }

        .panel {
            position: absolute;
            right: clamp(20px, 5vw, 84px);
            top: 50%;
            transform: translateY(-50%);
            z-index: 4;
            background: var(--surface);
            backdrop-filter: blur(16px);
            border-radius: var(--radius-xl);
            border: 1px solid rgba(255, 255, 255, 0.66);
            box-shadow: var(--shadow);
            padding: 22px;
            max-height: calc(100dvh - (var(--page-padding) * 2) - 24px);
            display: flex;
            flex-direction: column;
            gap: 18px;
            width: clamp(320px, 40vw, 500px);
            overflow: hidden;
        }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .panel-badge {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(245, 244, 240, 0.98);
            display: grid;
            place-items: center;
            color: var(--text-soft);
            box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.04);
            flex-shrink: 0;
        }

        .panel-badge svg {
            width: 20px;
            height: 20px;
        }

        .panel-header h2,
        .panel-copy h3,
        .panel-copy p,
        .timeline-card h3,
        .timeline-card p,
        .timeline-card span,
        .highlight-card h3,
        .highlight-card p {
            margin: 0;
        }

        .panel-header h2 {
            font-size: 1.35rem;
            font-weight: 500;
            letter-spacing: -0.02em;
        }

        .panel-copy {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .panel-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .meta-pill {
            display: inline-flex;
            align-items: center;
            min-height: 32px;
            padding: 0 12px;
            border-radius: var(--radius-pill);
            background: rgba(255, 255, 255, 0.7);
            color: var(--text-soft);
            font-size: 0.86rem;
            border: 1px solid rgba(18, 18, 18, 0.05);
            letter-spacing: 0.01em;
        }

        .panel-copy h3 {
            font-size: 1.56rem;
            letter-spacing: -0.03em;
            font-weight: 600;
        }

        .panel-copy p {
            color: var(--text-soft);
            line-height: 1.6;
            font-size: 0.98rem;
        }

        .panel-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 18px;
            min-height: 0;
        }

        .panel-body {
            position: relative;
            min-height: 0;
            overflow: auto;
            padding-right: 4px;
        }

        .panel-view {
            animation: panel-fade 260ms ease;
        }

        @keyframes panel-fade {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .timeline {
            display: flex;
            flex-direction: column;
            gap: 18px;
            position: relative;
            padding-top: 4px;
        }

        .timeline-item {
            display: grid;
            grid-template-columns: 26px 1fr;
            gap: 16px;
            align-items: start;
        }

        .timeline-line {
            position: relative;
            display: flex;
            justify-content: center;
            min-height: 100%;
            padding-top: 6px;
        }

        .timeline-line::after {
            content: "";
            position: absolute;
            top: 18px;
            bottom: -26px;
            width: 1.5px;
            background: rgba(60, 60, 60, 0.22);
        }

        .timeline-item:last-child .timeline-line::after {
            display: none;
        }

        .timeline-dot {
            position: relative;
            z-index: 1;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1.5px solid rgba(109, 109, 109, 0.46);
            background: rgba(255, 255, 255, 0.94);
            box-shadow: 0 0 0 5px rgba(255, 255, 255, 0.75);
        }

        .timeline-item.is-active .timeline-dot {
            border-color: rgba(151, 151, 151, 0.8);
            box-shadow: 0 0 0 4px rgba(216, 216, 216, 0.95);
            background: rgba(223, 223, 223, 1);
        }

        .timeline-card,
        .highlight-card {
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.55);
            padding: 18px 18px 16px;
            border: 1px solid rgba(255, 255, 255, 0.45);
        }

        .timeline-item.is-active .timeline-card {
            background: var(--surface-muted);
            box-shadow: 0 12px 26px rgba(0, 0, 0, 0.05);
        }

        .timeline-card h3,
        .highlight-card h3 {
            font-size: 1.1rem;
            margin-bottom: 4px;
            letter-spacing: -0.02em;
        }

        .timeline-card p,
        .highlight-card p {
            color: var(--text-soft);
            font-size: 0.94rem;
            line-height: 1.45;
        }

        .timeline-card span {
            display: inline-block;
            margin-top: 6px;
            color: var(--text-faint);
            font-size: 0.88rem;
        }

        .highlights {
            display: grid;
            gap: 14px;
        }

        .highlight-card ul {
            margin: 12px 0 0;
            padding-left: 18px;
            color: var(--text-soft);
            display: grid;
            gap: 8px;
            line-height: 1.45;
            font-size: 0.93rem;
        }

        .video-shell.is-switching .model-canvas {
            opacity: 0.82;
            transform: scale(0.988);
        }

        .video-shell .model-canvas {
            transition: opacity 180ms ease, transform 180ms ease;
        }

        .social {
            position: absolute;
            left: var(--page-padding);
            bottom: var(--page-padding);
            z-index: 5;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.62);
            border: 1px solid rgba(255, 255, 255, 0.66);
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(14px);
            width: fit-content;
        }

        .social a {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            color: var(--text-soft);
            display: grid;
            place-items: center;
            text-decoration: none;
            transition: transform 160ms ease, background-color 160ms ease, color 160ms ease;
        }

        .social a:hover {
            transform: translateY(-2px);
            background: rgba(0, 0, 0, 0.05);
            color: var(--text);
        }

        .social svg {
            width: 22px;
            height: 22px;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @media (max-width: 1280px) {
            .hero-stage {
                height: min(760px, calc(100dvh - var(--page-padding)));
                max-width: 1180px;
            }
        }

        @media (max-width: 1060px) {
            .page {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr;
            }

            .hero {
                grid-column: 1;
            }

            .panel {
                right: var(--page-padding);
                top: 50%;
                transform: translateY(-50%);
                width: min(360px, 34vw);
                max-height: calc(100dvh - (var(--page-padding) * 2) - 56px);
            }

            .hero-stage {
                width: 100%;
            }
        }

        @media (max-width: 760px) {
            html,
            body {
                min-height: 100%;
                overflow-x: hidden;
                overflow-y: auto;
            }

            .page {
                height: auto;
                min-height: 100dvh;
                overflow: visible;
                padding: 18px 18px 24px;
                display: block;
            }

            .identity {
                position: relative;
                top: auto;
                left: auto;
                margin-bottom: 16px;
            }

            .identity h1 {
                font-size: 2.2rem;
            }

            .identity p {
                font-size: 1rem;
            }

            .hero {
                height: auto;
                min-height: unset;
                display: block;
            }

            .hero-stage {
                width: 100%;
                max-width: none;
                height: auto;
                min-height: 0;
                padding: 12px 0 0;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .hero-orbit {
                display: none;
            }

            .video-shell {
                position: relative;
                left: auto;
                bottom: auto;
                width: min(100%, 360px);
                margin: 0 auto 18px;
                transform: none;
                order: 1;
            }

            .nav-cluster {
                position: relative;
                inset: auto;
                width: 100%;
                margin: 0 0 18px;
                display: flex;
                flex-direction: row;
                flex-wrap: nowrap;
                gap: 12px;
                overflow-x: auto;
                overflow-y: hidden;
                padding: 4px 2px 10px;
                pointer-events: auto;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
                order: 2;
            }

            .nav-cluster::-webkit-scrollbar {
                display: none;
            }

            .nav-item {
                position: static;
                flex: 0 0 auto;
                width: auto;
                justify-content: center;
                min-width: 48px;
                min-height: 48px;
                padding: 0 16px;
                border-radius: 999px;
            }

            .nav-item-icon {
                display: inline-flex;
                align-items: center;
                justify-content: center;
            }

            .nav-item-label {
                display: none;
            }

            .nav-item.is-active .nav-item-label {
                display: inline;
            }

            .nav-item.is-active {
                justify-content: flex-start;
            }

            .icon-rail {
                display: none;
            }

            .panel {
                position: relative;
                left: auto;
                right: auto;
                top: auto;
                bottom: auto;
                transform: none;
                width: 100%;
                max-height: none;
                padding: 18px;
                border-radius: 26px;
                margin-top: 4px;
            }

            .social {
                position: relative;
                left: auto;
                bottom: auto;
                margin-top: 20px;
            }
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation: none !important;
                transition: none !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>

<body>
    <main class="page">
        <section class="identity" aria-label="Profile">
            <!-- <img src="apisit.png" alt="Apisit Profile" class="avatar"> -->
            <div class="avatar-container">
                <img src="apisit.png" alt="Apisit Profile" class="avatar-img">
            </div>
            <div>
                <h1>Apisit Vijit</h1>
                <p>Software engineer</p>
            </div>
        </section>

        <section class="hero" aria-label="Hero">
            <div class="hero-stage">
                <svg class="hero-orbit" id="heroOrbit" aria-hidden="true" viewBox="0 0 100 100"
                    preserveAspectRatio="none">
                    <path id="heroOrbitPath"></path>
                </svg>
                <div class="nav-cluster" id="navCluster" aria-label="Sections" role="tablist"
                    aria-orientation="vertical"></div>
                <div class="icon-rail" id="iconRail" aria-hidden="true"></div>
                <div class="video-shell">
                    <canvas class="model-canvas" id="heroCanvas" aria-label="3D model viewer"></canvas>
                    <div class="video-fallback" id="videoFallback">
                        <p>3D preview is unavailable right now. The viewer is ready to use once the model can be loaded
                            successfully.</p>
                    </div>
                    <div class="video-status" id="videoStatus" aria-live="polite">
                        <span class="video-dot" aria-hidden="true"></span>
                        <span id="videoStatusText">Loading 3D preview...</span>
                    </div>
                </div>
            </div>
        </section>

        <aside class="panel" aria-live="polite">
            <div class="panel-header">
                <div class="panel-badge" id="panelBadge"></div>
                <h2 id="panelHeading"></h2>
            </div>
            <div class="panel-content" id="panelRoot" role="tabpanel" tabindex="0">
                <div class="panel-copy">
                    <h3 id="panelTitle"></h3>
                    <p id="panelDescription"></p>
                    <div class="panel-meta" id="panelMeta"></div>
                </div>
                <div class="panel-body" id="panelBody"></div>
            </div>
        </aside>

        <nav class="social" aria-label="Social links">
            <a href="#" aria-label="GitHub">
                <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <path
                        d="M12 .5C5.65.5.5 5.7.5 12.1c0 5.1 3.3 9.5 7.9 11 .6.1.8-.3.8-.6v-2.2c-3.2.7-3.9-1.4-3.9-1.4-.5-1.4-1.3-1.8-1.3-1.8-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1.1 1.9 2.8 1.3 3.5 1 .1-.8.4-1.3.8-1.6-2.6-.3-5.4-1.3-5.4-6a4.7 4.7 0 0 1 1.2-3.2c-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.3 1.2a11.2 11.2 0 0 1 6 0c2.3-1.5 3.3-1.2 3.3-1.2.6 1.6.2 2.8.1 3.1a4.7 4.7 0 0 1 1.2 3.2c0 4.7-2.8 5.7-5.4 6 .4.4.9 1.1.9 2.3v3.3c0 .3.2.7.8.6a11.6 11.6 0 0 0 7.9-11C23.5 5.7 18.3.5 12 .5Z" />
                </svg>
            </a>
            <a href="#" aria-label="Line">

        function setViewerState(state, text) {
            videoShell.classList.toggle("is-loading", state === "loading");
            videoShell.classList.toggle("is-fallback", state === "fallback");
            videoStatusText.textContent = text;
        }

        function fadeToAction(nextAction, fadeDuration = 0.22) {
            if (!nextAction || currentAction === nextAction) return;

            const previousAction = currentAction;
            currentAction = nextAction;
            currentAction.reset().fadeIn(fadeDuration).play();

            if (previousAction) {
                previousAction.fadeOut(fadeDuration);
            }
        }

        function playIdleAnimation() {
            if (!idleAction) return;

            idleAction.enabled = true;
            idleAction.setLoop(THREE.LoopRepeat, Infinity);
            idleAction.clampWhenFinished = false;
            fadeToAction(idleAction);
        }

        function playSectionAnimation(clipName) {
            const nextAction = clipActions.get(clipName);
            if (!nextAction) {
                playIdleAnimation();
                return;
            }

            nextAction.enabled = true;
            nextAction.setLoop(THREE.LoopOnce, 1);
            nextAction.clampWhenFinished = true;
            nextAction.reset();
            fadeToAction(nextAction, 0.18);
        }

        function initThree() {
            renderer = new THREE.WebGLRenderer({
                canvas: heroCanvas,
                alpha: true,
                antialias: true
            });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x000000, 0);
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 0.88;

            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(30, 1, 0.1, 100);
            camera.position.set(0, 1.02, 5.45);

            controls = new OrbitControls(camera, heroCanvas);
            controls.enablePan = false;
            controls.enableZoom = false;
            controls.enableDamping = true;
            controls.enableRotate = true;
            controls.target.set(0, 0.9, 0);
            controls.minAzimuthAngle = -0.45;
            controls.maxAzimuthAngle = 0.45;
            controls.minPolarAngle = 1.05;
            controls.maxPolarAngle = 1.65;

            const ambient = new THREE.AmbientLight(0xffffff, 0.95);
            scene.add(ambient);

            const hemiLight = new THREE.HemisphereLight(0xfff6e7, 0xd7d2cb, 0.9);
            hemiLight.position.set(0, 4, 0);
            scene.add(hemiLight);

            const keyLight = new THREE.DirectionalLight(0xffffff, 1.55);
            keyLight.position.set(2.8, 5.5, 4.5);
            scene.add(keyLight);

            const fillLight = new THREE.DirectionalLight(0xfff4de, 0.72);
            fillLight.position.set(-3.5, 2.8, 3.2);
            scene.add(fillLight);

            const rimLight = new THREE.DirectionalLight(0xdde6ff, 0.82);
            rimLight.position.set(-2.2, 2, -3.2);
            scene.add(rimLight);

            const groundGlow = new THREE.PointLight(0xfff2dd, 0.7, 18);
            groundGlow.position.set(0, 0.8, 3.5);
            scene.add(groundGlow);

            const floor = new THREE.Mesh(
                new THREE.CircleGeometry(2.1, 64),
                new THREE.MeshBasicMaterial({ color: 0xe4dfd8, transparent: true, opacity: 0.35 })
            );
            floor.rotation.x = -Math.PI / 2;
            floor.position.set(0, -1.55, 0);
            scene.add(floor);

            resizeRenderer();
            window.addEventListener("resize", resizeRenderer);
            resizeObserver = new ResizeObserver(() => resizeRenderer());
            resizeObserver.observe(heroCanvas.parentElement);
            animate();
        }

        function resizeRenderer() {
            const bounds = heroCanvas.parentElement.getBoundingClientRect();
            const width = Math.max(Math.floor(bounds.width), 320);
            const height = Math.max(Math.floor(bounds.height), 420);
            renderer.setSize(width, height, false);
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
        }

        function frameModel(model) {
            const box = new THREE.Box3().setFromObject(model);
            const size = new THREE.Vector3();
            const center = new THREE.Vector3();
            box.getSize(size);
            box.getCenter(center);

            const pivot = new THREE.Group();
            pivot.add(model);
            scene.add(pivot);

            model.position.set(-center.x, -box.min.y, -center.z);

            const normalizedBox = new THREE.Box3().setFromObject(pivot);
            const normalizedSize = new THREE.Vector3();
            const normalizedCenter = new THREE.Vector3();
            normalizedBox.getSize(normalizedSize);
            normalizedBox.getCenter(normalizedCenter);

            const targetHeight = 3.5;
            const scale = targetHeight / normalizedSize.y;
            pivot.scale.setScalar(scale);

            const scaledBox = new THREE.Box3().setFromObject(pivot);
            const scaledSize = new THREE.Vector3();
            const scaledCenter = new THREE.Vector3();
            scaledBox.getSize(scaledSize);
            scaledBox.getCenter(scaledCenter);

            const halfHeight = scaledSize.y * 0.5;
            const halfWidth = scaledSize.x * 0.5;
            const verticalFov = THREE.MathUtils.degToRad(camera.fov);
            const horizontalFov = 2 * Math.atan(Math.tan(verticalFov / 2) * camera.aspect);
            const fitHeightDistance = halfHeight / Math.tan(verticalFov * 0.5);
            const fitWidthDistance = halfWidth / Math.tan(horizontalFov * 0.5);
            const distance = Math.max(fitHeightDistance, fitWidthDistance) * 0.75;

            pivot.position.set(0, -scaledBox.min.y - 1.2, 0);
            pivot.rotation.y = 0.02;

            controls.target.set(0, scaledCenter.y * 0.46, 0);
            camera.position.set(0, scaledCenter.y * 0.42, distance);
            controls.update();

            activeModel = pivot;
        }

        async function loadModel(assetPath) {
            if (!assetPath || assetPath === activeAssetPath) return;

            setViewerState("loading", "Loading 3D preview...");
            videoShell.classList.add("is-switching");

            if (activeModel) {
                scene.remove(activeModel);
                activeModel.traverse((child) => {
                    if (child.isMesh) {
                        child.geometry?.dispose?.();
                        if (Array.isArray(child.material)) {
                            child.material.forEach((material) => material.dispose?.());
                        } else {
                            child.material?.dispose?.();
                        }
                    }
                });
                activeModel = null;
            }

            if (mixer) {
                mixer.stopAllAction();
                mixer = null;
            }

            clipActions = new Map();
            currentAction = null;
            idleAction = null;

            const loader = new GLTFLoader();

            try {
                const gltf = await loader.loadAsync(assetPath);
                activeAssetPath = assetPath;
                const modelScene = gltf.scene;

                modelScene.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = false;
                        child.receiveShadow = false;
                        if (child.material) {
                            child.material.side = THREE.FrontSide;
                        }
                    }
                });

                frameModel(modelScene);

                const animationNames = (gltf.animations || []).map((clip, index) => clip.name || `unnamed_${index}`);
                window.__modelAnimationNames = animationNames;
                console.log("[resume] Loaded model:", assetPath);
                console.log("[resume] Animation names:", animationNames);

                if (gltf.animations && gltf.animations.length) {
                    mixer = new THREE.AnimationMixer(activeModel);
                    gltf.animations.forEach((clip, index) => {
                        const clipName = clip.name || `unnamed_${index}`;
                        clipActions.set(clipName, mixer.clipAction(clip));
                    });

                    mixer.addEventListener("finished", (event) => {
                        if (event.action !== idleAction) {
                            playIdleAnimation();
                        }
                    });


                    idleAction = clipActions.get(IDLE_CLIP_NAME) || clipActions.get(animationNames[0]) || null;
                    playIdleAnimation();
                } else {
                    mixer = null;
                }

                setViewerState("ready", "3D preview ready");
            } catch (error) {
                activeAssetPath = null;
                mixer = null;
                console.error(error);
                setViewerState("fallback", "3D model failed to load. Try opening this page through a local server.");
            } finally {
                window.setTimeout(() => {
                    videoShell.classList.remove("is-switching");
                }, 220);
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            mixer?.update(delta);
            controls?.update();
            renderer?.render(scene, camera);
        }

        let activeSectionId = window.localStorage.getItem(STORAGE_KEY) || "experience";

        if (!sections.some((section) => section.id === activeSectionId)) {
            activeSectionId = "experience";
        }

        function focusSectionByOffset(offset) {
            const currentIndex = sections.findIndex((section) => section.id === activeSectionId);
            const nextIndex = (currentIndex + offset + sections.length) % sections.length;
            setActiveSection(sections[nextIndex].id, { focusButton: true });
        }

        function renderOrbitIcons() {
            iconRail.innerHTML = "";

            sections.forEach((section) => {
                const icon = document.createElement("div");
                icon.className = `icon-node${section.id === activeSectionId ? " is-active" : ""}`;
                icon.innerHTML = iconMarkup[section.icon] || iconMarkup.monitor;
                iconRail.appendChild(icon);
            });
        }

        function updateOrbitPath() {
            if (window.innerWidth <= 760) {
                heroOrbitPath.setAttribute("d", "");
                return null;
            }

            const stageRect = heroStage.getBoundingClientRect();
            const modelRect = videoShell.getBoundingClientRect();
            const centerX = (modelRect.left - stageRect.left) + (modelRect.width / 2) - 40;
            const centerY = (modelRect.top - stageRect.top) + (modelRect.height / 2) - 35;
            const radius = Math.min(stageRect.width, stageRect.height) * 0.345;
            const startX = centerX;
            const startY = centerY + radius;
            const endX = centerX;
            const endY = centerY - radius;
            const d = `M ${startX} ${startY} A ${radius} ${radius} 0 0 1 ${endX} ${endY}`;

            heroOrbit.setAttribute("viewBox", `0 0 ${stageRect.width} ${stageRect.height}`);
            heroOrbitPath.setAttribute("d", d);

            return { stageRect, pathLength: heroOrbitPath.getTotalLength() };
        }

        function layoutArcItems() {
            if (window.innerWidth <= 760) return;

            const orbit = updateOrbitPath();
            if (!orbit) return;

            const { stageRect, pathLength } = orbit;
            const navButtons = Array.from(navCluster.querySelectorAll(".nav-item"));
            const iconNodes = Array.from(iconRail.querySelectorAll(".icon-node"));
            const padding = 0.3;

            iconNodes.forEach((iconNode, index) => {
                const t = iconNodes.length === 1 ? 0.5 : padding + ((index / (iconNodes.length - 1)) * (1 - (padding * 2)));
                const point = heroOrbitPath.getPointAtLength(pathLength * (1 - t));
                const iconCenterX = point.x;
                const iconCenterY = point.y;

                iconNode.style.left = `${iconCenterX - (iconNode.offsetWidth / 2)}px`;
                iconNode.style.top = `${iconCenterY - (iconNode.offsetHeight / 2)}px`;

                const button = navButtons[index];
                if (button) {
                    const gap = Math.max(42, stageRect.width * 0.022);
                    button.style.left = `${iconCenterX - button.offsetWidth - gap}px`;
                    button.style.top = `${iconCenterY - (button.offsetHeight / 2)}px`;
                }
            });
        }

        function renderNav() {
            navCluster.innerHTML = "";
            iconRail.innerHTML = "";

            sections.forEach((section) => {
                const button = document.createElement("button");
                button.type = "button";
                button.className = `nav-item${section.id === activeSectionId ? " is-active" : ""}`;
                button.dataset.section = section.id;
                button.id = `tab-${section.id}`;
                button.setAttribute("role", "tab");
                button.setAttribute("tabindex", section.id === activeSectionId ? "0" : "-1");
                button.setAttribute("aria-selected", String(section.id === activeSectionId));
                button.setAttribute("aria-controls", "panelRoot");
                button.setAttribute("aria-pressed", String(section.id === activeSectionId));
                button.innerHTML = `
                    <span class="nav-item-icon" aria-hidden="true">${iconMarkup[section.icon] || iconMarkup.monitor}</span>
                    <span class="nav-item-label">${section.label}</span>
                `;
                button.addEventListener("click", () => setActiveSection(section.id));
                button.addEventListener("keydown", (event) => {
                    if (event.key === "ArrowDown" || event.key === "ArrowRight") {
                        event.preventDefault();
                        focusSectionByOffset(1);
                    }

                    if (event.key === "ArrowUp" || event.key === "ArrowLeft") {
                        event.preventDefault();
                        focusSectionByOffset(-1);
                    }

                    if (event.key === "Home") {
                        event.preventDefault();
                        setActiveSection(sections[0].id, { focusButton: true });
                    }

                    if (event.key === "End") {
                        event.preventDefault();
                        setActiveSection(sections[sections.length - 1].id, { focusButton: true });
                    }
                });
                navCluster.appendChild(button);
            });

            renderOrbitIcons();
            window.requestAnimationFrame(layoutArcItems);
        }

        function renderTimeline(items) {
            const wrapper = document.createElement("div");
            wrapper.className = "timeline";

            items.forEach((item) => {
                const node = document.createElement("article");
                node.className = `timeline-item${item.active ? " is-active" : ""}`;
                node.innerHTML = `
          <div class="timeline-line">
            <div class="timeline-dot" aria-hidden="true"></div>
          </div>
          <div class="timeline-card">
            <h3>${item.title}</h3>
            <p>${item.company}</p>
            <span>${item.period}</span>
          </div>
        `;
                wrapper.appendChild(node);
            });

            return wrapper;
        }

        function renderHighlights(items) {
            const wrapper = document.createElement("div");
            wrapper.className = "highlights";

            items.forEach((item) => {
                const card = document.createElement("article");
                card.className = "highlight-card";

                const points = item.points.map((point) => `<li>${point}</li>`).join("");
                card.innerHTML = `
          <h3>${item.title}</h3>
          <p>${item.description}</p>
          <ul>${points}</ul>
        `;
                wrapper.appendChild(card);
            });

            return wrapper;
        }

        function renderPanel() {
            const section = sections.find((entry) => entry.id === activeSectionId) || sections[0];
            panelHeading.textContent = section.heading;
            panelTitle.textContent = section.title;
            panelDescription.textContent = section.description;
            panelRoot.setAttribute("aria-labelledby", `tab-${section.id}`);
            panelBadge.innerHTML = iconMarkup[section.layout === "timeline" ? "bag" : section.icon] || iconMarkup.bag;
            panelMeta.innerHTML = "";
            (section.meta || []).forEach((item) => {
                const pill = document.createElement("span");
                pill.className = "meta-pill";
                pill.textContent = item;
                panelMeta.appendChild(pill);
            });
            panelBody.innerHTML = "";

            const view = document.createElement("div");
            view.className = "panel-view";

            if (section.layout === "timeline") {
                view.appendChild(renderTimeline(section.timeline));
            } else {
                view.appendChild(renderHighlights(section.highlights));
            }

            panelBody.appendChild(view);
        }

        function syncHeroAsset(section) {
            const nextModel = section.modelSrc || "./idle_two.glb";
            loadModel(nextModel);
        }

        function setActiveSection(sectionId, options = {}) {
            activeSectionId = sectionId;
            window.localStorage.setItem(STORAGE_KEY, sectionId);
            renderNav();
            renderPanel();
            const section = sections.find((entry) => entry.id === sectionId) || sections[0];
            syncHeroAsset(section);

            if (options.playAnimation !== false) {
                if (activeAssetPath === section.modelSrc) {
                    playSectionAnimation(section.animationClip);
                } else {
                    window.setTimeout(() => playSectionAnimation(section.animationClip), 280);
                }
            }

            if (options.focusButton) {
                document.getElementById(`tab-${sectionId}`)?.focus();
            }
        }

        initThree();
        window.addEventListener("resize", () => window.requestAnimationFrame(layoutArcItems));
        setActiveSection(activeSectionId, { playAnimation: false });
    </script>
</body>

</html>
